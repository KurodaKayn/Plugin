version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bidichk
    - bodyclose
    - errname
    - errorlint
    - gosec
    - intrange
    - loggercheck
    - misspell
    - modernize
    - nilerr
    - nilnil
    - nolintlint
    - promlinter
    - revive
    - rowserrcheck
    - sqlclosecheck
    - testableexamples
    - testifylint
    - thelper
    - unqueryvet
    - usestdlibvars
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    generated: strict

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kurodakayn/plugin
  exclusions:
    generated: strict
